<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master MCQ Generator - Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --p: #2c3e50; --a: #3498db; --s: #27ae60; --d: #e74c3c; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-top: 70px; }
        .header { position: fixed; top: 0; width: 100%; background: var(--p); color: white; padding: 10px 0; z-index: 1000; text-align: center; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .config-card, .q-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-add { background: var(--a); width: 100%; font-size: 18px; margin-bottom: 20px; }
        .btn-gh { background: #24292e; }
        .loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); color: white; z-index: 9999; align-items: center; justify-content: center; font-size: 20px; flex-direction: column; }
    </style>
</head>
<body>

<div id="loader" class="loader">
    <i class="fas fa-spinner fa-spin fa-3x"></i>
    <p style="margin-top: 15px;">মাস্টার কুইজ ফাইল তৈরি ও আপলোড হচ্ছে...</p>
</div>

<div class="header">
    <button class="btn" onclick="location.href='index.html'" style="background:#555"><i class="fas fa-arrow-left"></i> ব্যাক</button>
    <b>মাস্টার কুইজ জেনারেটর (Pro Version)</b>
    <button class="btn" style="background:var(--d)" onclick="clearAll()"><i class="fas fa-trash"></i> মুছুন</button>
</div>

<div class="container">
    <div class="config-card">
        <div class="grid-2">
            <input type="text" id="qTitle" placeholder="কুইজের নাম (উদা: মডেল টেস্ট ১)">
            <input type="text" id="qClass" placeholder="শ্রেণি">
            <input type="text" id="qSub" placeholder="বিষয়">
            <input type="text" id="qChap" placeholder="অধ্যায়">
            <input type="number" id="qTime" placeholder="সময় (মিনিট)">
            <input type="number" id="qMarks" placeholder="পূর্ণমান">
            <input type="text" id="fName" placeholder="ফাইলের নাম (উদা: 601)">
        </div>
        <div class="grid-2" style="margin-top:10px;">
            <button class="btn" style="background:var(--s)" onclick="saveDraft()"><i class="fas fa-save"></i> ড্রাফট সেইভ</button>
            <button class="btn btn-gh" onclick="uploadToGithub()"><i class="fab fa-github"></i> মাস্টার কুইজ আপলোড</button>
        </div>
        <button class="btn" style="background:#7f8c8d; width: 100%; margin-top: 10px;" onclick="resetToken()"><i class="fas fa-key"></i> GitHub টুকেন রিসেট করুন</button>
    </div>

    <div id="q-area"></div>
    <button class="btn btn-add" onclick="addQ()">+ নতুন প্রশ্ন যোগ করুন</button>
</div>

<script>
    const GITHUB_USER = "palashmahmod";
    const GITHUB_REPO = "quiz-files";
    let qCount = 0;

    function addQ(data = null) {
        qCount++;
        const id = Date.now() + qCount;
        const div = document.createElement('div');
        div.className = 'q-card';
        div.id = 'block-' + id;
        div.innerHTML = `
            <div style="display:flex; justify-content:space-between"><b>প্রশ্ন নং: ${qCount}</b> 
            <button onclick="removeQ('${id}')" style="color:red; border:none; background:none; cursor:pointer"><i class="fas fa-times"></i></button></div>
            <textarea placeholder="উদ্দীপক (ঐচ্ছিক)" class="stim">${data?data.stim:''}</textarea>
            <textarea placeholder="মূল প্রশ্ন" class="ques">${data?data.ques:''}</textarea>
            <input type="text" placeholder="ছবির লিঙ্ক (যদি থাকে)" class="img" value="${data?data.img:''}">
            <div class="grid-2">
                <input type="text" placeholder="ক)" class="o1" value="${data?data.o1:''}">
                <input type="text" placeholder="খ)" class="o2" value="${data?data.o2:''}">
                <input type="text" placeholder="গ)" class="o3" value="${data?data.o3:''}">
                <input type="text" placeholder="ঘ)" class="o4" value="${data?data.o4:''}">
            </div>
            <select class="ans">
                <option value="ক" ${data?.ans=='ক'?'selected':''}>সঠিক উত্তর: ক</option>
                <option value="খ" ${data?.ans=='খ'?'selected':''}>সঠিক উত্তর: খ</option>
                <option value="গ" ${data?.ans=='গ'?'selected':''}>সঠিক উত্তর: গ</option>
                <option value="ঘ" ${data?.ans=='ঘ'?'selected':''}>সঠিক উত্তর: ঘ</option>
            </select>
        `;
        document.getElementById('q-area').appendChild(div);
    }

    function removeQ(id) { document.getElementById('block-'+id).remove(); }

    function saveDraft() {
        const qs = [];
        document.querySelectorAll('.q-card').forEach(b => {
            qs.push({
                stim: b.querySelector('.stim').value, ques: b.querySelector('.ques').value,
                img: b.querySelector('.img').value, o1: b.querySelector('.o1').value,
                o2: b.querySelector('.o2').value, o3: b.querySelector('.o3').value,
                o4: b.querySelector('.o4').value, ans: b.querySelector('.ans').value
            });
        });
        const fullData = {
            title: document.getElementById('qTitle').value, cls: document.getElementById('qClass').value,
            sub: document.getElementById('qSub').value, chap: document.getElementById('qChap').value,
            time: document.getElementById('qTime').value, marks: document.getElementById('qMarks').value,
            fName: document.getElementById('fName').value, questions: qs
        };
        localStorage.setItem('draft_quiz', JSON.stringify(fullData));
    }

    function generateFullHTML() {
        const d = JSON.parse(localStorage.getItem('draft_quiz'));
        if(!d) return "";
        return `<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>\${d.title}</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"><\/script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"><\/script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #2c3e50; --s: #27ae60; --d: #e74c3c; --a: #3498db; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; user-select: none; }
        .card { background: white; padding: 20px; border-radius: 15px; max-width: 600px; margin: 10px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .page { display: none; }
        .active-page { display: block; }
        .info-box { background: #e3f2fd; padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px solid #bbdefb; line-height: 1.6; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .btn-start { background: var(--s); color: white; }
        .btn-submit { background: var(--p); color: white; }
        .timer { position: fixed; top: 0; left: 0; width: 100%; background: var(--d); color: white; text-align: center; padding: 8px 0; font-weight: bold; z-index: 1000; }
        .q-box { border-bottom: 1px solid #eee; padding: 15px 0; }
        .opt { display: block; padding: 12px; background: #f9f9f9; margin: 8px 0; border-radius: 8px; cursor: pointer; border: 1px solid #ddd; }
        .correct { background: #d4edda !important; border-color: #28a745 !important; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; }
        input[type="radio"] { transform: scale(1.2); margin-right: 10px; }
        img { max-width: 100%; border-radius: 8px; }
    </style>
</head>
<body oncontextmenu="return false">
    <div id="page1" class="card page active-page">
        <h2 style="text-align:center;">\${d.title}</h2>
        <div class="info-box">
            <b>শিক্ষার্থী:</b> <span id="stName">...</span> (ID: <span id="stID">...</span>)<br>
            <b>বিষয়:</b> \${d.sub} | <b>সময়:</b> \${d.time} মিনিট
        </div>
        <button class="btn btn-start" onclick="startExam()">পরীক্ষা শুরু করুন</button>
        <button class="btn" style="background:#888; color:white;" onclick="exitApp()">ব্যাক</button>
    </div>
    <div id="page2" class="page">
        <div class="timer" id="timerDisp">সময় বাকি: --:--</div>
        <div class="card" style="margin-top: 50px;">
            <div id="quizArea"></div>
            <button class="btn btn-submit" onclick="confirmSubmit()">পরীক্ষা জমা দিন</button>
        </div>
    </div>
    <div id="page3" class="card page">
        <h2 style="text-align:center; color:var(--s);">ফলাফল বিবরণী</h2>
        <div id="resultSummary" class="info-box"></div>
        <div id="reviewArea"></div>
        <button class="btn" style="background:var(--a); color:white;" onclick="exitApp()">হোম পেজে ফিরে যান</button>
        <p style="font-size:12px; color:red; text-align:center;">২ মিনিট পর অটোমেটিক হোম পেজে নিয়ে যাওয়া হবে।</p>
    </div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyBmCTx0ytWLW6YPeAbUHGEixFOehynuEco", databaseURL: "https://quiz-storage-d8707-default-rtdb.firebaseio.com/", projectId: "quiz-storage-d8707" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const uID = urlParams.get('id');
    const uName = urlParams.get('name');
    const uRoll = urlParams.get('roll');
    const uSec = urlParams.get('sec');
    const uCls = urlParams.get('cls');
    const fName = "\${d.fName}";
    document.getElementById('stName').innerText = uName;
    document.getElementById('stID').innerText = uID;
    const questions = \${JSON.stringify(d.questions)};
    let timerInt, endTime;
    window.history.pushState(null, null, window.location.href);
    window.onpopstate = function() { exitApp(); };
    window.onload = function() {
        const savedTime = localStorage.getItem('end_' + uID + '_' + fName);
        if(savedTime) startExam(true);
    };
    function startExam(isResume = false) {
        document.getElementById('page1').classList.remove('active-page');
        document.getElementById('page2').classList.add('active-page');
        renderQuestions();
        if(!isResume) {
            endTime = Date.now() + (Number(\${d.time || 0}) * 60 * 1000);
            localStorage.setItem('end_' + uID + '_' + fName, endTime);
            db.ref('LiveTimers/' + uID + '/' + fName).set(endTime);
        } else {
            endTime = parseInt(localStorage.getItem('end_' + uID + '_' + fName));
        }
        timerInt = setInterval(updateTimer, 1000);
    }
    function renderQuestions() {
        let html = '';
        questions.forEach((q, i) => {
            const saved = localStorage.getItem('ans_' + uID + '_' + fName + '_' + i);
            html += '<div class="q-box">' +
                '<b>' + (i+1) + '. ' + (q.stim ? q.stim + '<br>' : '') + q.ques + '</b>' +
                (q.img ? '<img src="'+q.img+'">' : '') +
                ['ক','খ','গ','ঘ'].map((opt, j) => {
                    return '<label class="opt">' +
                        '<input type="radio" name="q' + i + '" value="' + opt + '" onchange="saveProgress(' + i + ', \\'' + opt + '\\')" ' + (saved === opt ? 'checked' : '') + '> ' +
                        opt + ') ' + q['o'+(j+1)] +
                    '</label>';
                }).join('') +
            '</div>';
        });
        document.getElementById('quizArea').innerHTML = html;
    }
    function saveProgress(idx, val) { localStorage.setItem('ans_' + uID + '_' + fName + '_' + idx, val); }
    function updateTimer() {
        const diff = endTime - Date.now();
        if(diff <= 0) { clearInterval(timerInt); submitQuiz(); return; }
        let m = Math.floor(diff / 60000), s = Math.floor((diff % 60000) / 1000);
        document.getElementById('timerDisp').innerText = "সময় বাকি: " + m + ":" + (s < 10 ? '0' : '') + s;
    }
    function confirmSubmit() { if(confirm("জমা দিতে চান?")) submitQuiz(); }
    function submitQuiz() {
        clearInterval(timerInt);
        let correct = 0, results = [], wrongQ = [];
        questions.forEach((q, i) => {
            const sel = localStorage.getItem('ans_' + uID + '_' + fName + '_' + i);
            if(sel === q.ans) { correct++; } else { wrongQ.push(i + 1); }
            results.push({ sel, correct: sel === q.ans });
        });
        const timeSpentRaw = Math.floor((Number(\${d.time || 0}) * 60) - ((endTime - Date.now()) / 1000));
        const finalData = {
            userId: uID, name: uName, roll: uRoll || "N/A",
            section: uSec || "N/A", quizTitle: "\${d.title}",
            class: uCls || "\${d.cls}", subject: "\${d.sub}",
            chapter: "\${d.chap}", correct: correct, 
            total: questions.length, wrongQuestions: wrongQ.join(', '),
            timeSpent: Math.floor(timeSpentRaw/60) + "m " + (timeSpentRaw%60) + "s",
            date: new Date().toLocaleDateString('bn-BD'),
            time: new Date().toLocaleTimeString('bn-BD'),
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };
        db.ref('QuizResults').push(finalData);
        db.ref('IndividualQuizzes/' + uID + '/' + fName).remove();
        db.ref('LiveTimers/' + uID + '/' + fName).remove();
        showResult(finalData, results);
    }
    function showResult(data, results) {
        document.getElementById('page2').classList.remove('active-page');
        document.getElementById('page3').classList.add('active-page');
        document.getElementById('resultSummary').innerHTML = '<b>তারিখ:</b> ' + data.date + ' | <b>সময়:</b> ' + data.time + '<br>' +
            '<b>ব্যয়িত সময়:</b> ' + data.timeSpent + ' | <b>সঠিক:</b> ' + data.correct + '/' + data.total + '<br>' +
            '<b style="color:red;">ভুল প্রশ্নের ক্রমিক:</b> ' + (data.wrongQuestions || 'সব সঠিক');
        let reviewHtml = '';
        questions.forEach((q, i) => {
            reviewHtml += '<div class="q-box"><b>' + (i+1) + '. ' + q.ques + '</b>' +
                ['ক','খ','গ','ঘ'].map((opt, j) => {
                    let cls = (opt === q.ans) ? 'correct' : (opt === (results[i] ? results[i].sel : '') ? 'wrong' : '');
                    return '<div class="opt ' + cls + '">' + opt + ') ' + q['o'+(j+1)] + '</div>';
                }).join('') + '</div>';
        });
        document.getElementById('reviewArea').innerHTML = reviewHtml;
        window.history.pushState(null, null, window.location.href);
        setTimeout(exitApp, 120000);
    }
    function exitApp() {
        Object.keys(localStorage).forEach(key => { if(key.includes(uID) && key.includes(fName)) localStorage.removeItem(key); });
        window.location.replace("https://palashmahmod.github.io/index.html");
    }
<\/script>
</body>
</html>`;
    }

    async function uploadToGithub() {
        saveDraft();
        const fName = document.getElementById('fName').value;
        if(!fName) return alert("ফাইলের নাম দিন!");

        let token = localStorage.getItem('gh_token');
        if(!token) {
            token = prompt("GitHub Token দিন:");
            if(token) localStorage.setItem('gh_token', token);
            else return;
        }

        document.getElementById('loader').style.display='flex';
        const contentHTML = generateFullHTML();
        const content = btoa(unescape(encodeURIComponent(contentHTML)));
        
        // ভ্যারিয়েবল এস্কেপ (\) রিমুভ করা হয়েছে যাতে সঠিক মান বসে
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${fName}.html`;

        try {
            const check = await fetch(url, { 
                headers: { "Authorization": `token ${token}` } 
            });
            
            let sha = "";
            if(check.ok) { 
                const d = await check.json(); 
                sha = d.sha; 
            }

            const res = await fetch(url, {
                method: "PUT",
                headers: { 
                    "Authorization": `token ${token}`, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({ 
                    message: "Pro Quiz Upload", 
                    content: content, 
                    sha: sha || undefined 
                })
            });

            document.getElementById('loader').style.display='none';

            if(res.ok) {
                alert("মাস্টার কুইজ সফলভাবে আপলোড হয়েছে!"); 
            } else {
                const errData = await res.json();
                alert("আপলোড ব্যর্থ। কারণ: " + (errData.message || "Unknown error"));
            }
        } catch(e) { 
            document.getElementById('loader').style.display='none'; 
            alert("Error: " + e.message); 
        }
    }

    // নতুন যুক্ত করা ফাংশন: টোকেন রিসেট করার জন্য
    function resetToken() {
        if(confirm("আপনি কি GitHub টুকেনটি মুছে ফেলে নতুন টুকেন দিতে চান?")) {
            localStorage.removeItem('gh_token');
            alert("টুকেন সফলভাবে মুছে ফেলা হয়েছে। পরবর্তী আপলোডের সময় নতুন টুকেন চাওয়া হবে।");
        }
    }

    function clearAll() { if(confirm("সব মুছতে চান?")) { localStorage.removeItem('draft_quiz'); location.reload(); } }

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('draft_quiz'));
        if(saved) {
            document.getElementById('qTitle').value = saved.title || '';
            document.getElementById('qClass').value = saved.cls || '';
            document.getElementById('qSub').value = saved.sub || '';
            document.getElementById('qChap').value = saved.chap || '';
            document.getElementById('qTime').value = saved.time || '';
            document.getElementById('qMarks').value = saved.marks || '';
            document.getElementById('fName').value = saved.fName || '';
            if(saved.questions) saved.questions.forEach(q => addQ(q));
        } else { addQ(); }
    };
</script>
</body>
</html>
