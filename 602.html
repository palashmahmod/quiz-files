<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${quizData.title}</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; }
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: 10px auto; }
        .student-info-box { background: #f8fafc; border: 1px dashed #cbd5e1; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: left; }
        .student-info-box p { margin: 4px 0; font-size: 14px; font-weight: bold; color: #475569; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .btn-start { background: var(--success); color: white; }
        .q-box { margin-bottom: 20px; padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        .option-label { display: block; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .option-label:hover { background: #f0f7ff; }
        .stimulus { background: #f1f5f9; padding: 10px; border-left: 4px solid var(--accent); margin-bottom: 10px; font-style: italic; }
        #timer-bar { position: sticky; top: 0; background: var(--primary); color: white; padding: 10px; text-align: center; z-index: 1000; border-radius: 0 0 10px 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="setup-page" class="card">
        <h2 style="color:var(--primary); margin:0;">মডেল টেস্ট ২</h2>
        <p>শ্রেণি: ৮ম | বিষয়: বিজ্ঞান </p>
        <div class="student-info-box">
            <p><i class="fas fa-user"></i> নাম: <span id="studentName">--</span></p>
            <p><i class="fas fa-graduation-cap"></i> শ্রেণি: <span id="studentClass">--</span> | শাখা: <span id="studentSection">--</span></p>
            <p><i class="fas fa-id-badge"></i> রোল: <span id="studentRoll">--</span></p>
        </div>
        <button class="btn btn-start" onclick="startQuiz()">পরীক্ষা শুরু করুন</button>
    </div>

    <div id="exam-page" style="display:none">
        <div id="timer-bar">অবশিষ্ট সময়: <span id="time-left">২</span>:00</div>
        <div class="card" id="quiz-container"></div>
        <button class="btn btn-start" style="max-width:600px; margin:20px auto; display:block;" onclick="submitQuiz()">সাবমিট করুন</button>
    </div>

    <script>
        const studentInfo = JSON.parse(localStorage.getItem('loggedUser')) || {};
        // অটো-ফিল ডাটা লোড
        window.addEventListener('load', () => {
             if(document.getElementById('studentName')) document.getElementById('studentName').innerText = studentInfo.name || "--";
             if(document.getElementById('studentClass')) document.getElementById('studentClass').innerText = studentInfo.cls || "--";
             if(document.getElementById('studentSection')) document.getElementById('studentSection').innerText = studentInfo.sec || "--";
             if(document.getElementById('studentRoll')) document.getElementById('studentRoll').innerText = studentInfo.roll || "--";
        });

        const questions = [{"num":1,"stimulus":"ত","q":"কামাল","o1":"কাল","o2":"কত","o3":"দিন","o4":"গ","ans":"ঘ"},{"num":2,"stimulus":"","q":"জ","o1":"ত","o2":"দ","o3":"গ","o4":"চ","ans":"ক"}];
        let timeLeft = NaN;

        function startQuiz() {
            document.getElementById('setup-page').style.display = 'none';
            document.getElementById('exam-page').style.display = 'block';
            renderQuestions();
            startTimer();
        }

        function renderQuestions() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = questions.map((q, index) => `
                <div class="q-box">
                    \${q.stimulus ? '<div class="stimulus">' + q.stimulus + '</div>' : ''}
                    <b>\${index + 1}. \${q.q}</b>
                    <label class="option-label"><input type="radio" name="q\${index}" value="ক"> ক) \${q.o1}</label>
                    <label class="option-label"><input type="radio" name="q\${index}" value="খ"> খ) \${q.o2}</label>
                    <label class="option-label"><input type="radio" name="q\${index}" value="গ"> গ) \${q.o3}</label>
                    <label class="option-label"><input type="radio" name="q\${index}" value="ঘ"> ঘ) \${q.o4}</label>
                </div>
            `).join('');
        }

        function startTimer() {
            const display = document.getElementById('time-left');
            const interval = setInterval(() => {
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                display.innerText = \`\${mins}:\${secs < 10 ? '0' : ''}\${secs}\`;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    submitQuiz();
                }
                timeLeft--;
            }, 1000);
        }

        function submitQuiz() {
            alert("পরীক্ষা সফলভাবে সাবমিট হয়েছে!");
            location.reload();
        }
    </script>
</body>
</html>
