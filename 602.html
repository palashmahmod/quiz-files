<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>মডেল</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; }
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        .student-info-box { background: #f8fafc; border: 1px dashed #cbd5e1; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: left; }
        .student-info-box p { margin: 4px 0; font-size: 14px; font-weight: bold; color: #475569; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-start { background: var(--success); color: white; }
        #timer { position: sticky; top: 0; background: var(--primary); color: white; padding: 10px; text-align: center; border-radius: 5px; z-index: 100; font-weight: bold; margin-bottom: 10px; }
        .q-box { margin-bottom: 20px; padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        .option { display: block; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; }
        .selected { background: #d1ecf1; border-color: #0c5460; }
    </style>
</head>
<body>
    <div id="setup-page" class="card">
        <h2 style="color:var(--primary); margin-top:0;">মডেল</h2>
        <div style="background:var(--primary); color:white; padding:10px; border-radius:8px; font-size:14px; margin-bottom:10px;">
            শ্রেণি: ৮ম | বিষয়: বিজ্ঞান  | পূর্ণমান: ২
        </div>
        <div class="student-info-box">
            <p><i class="fas fa-user"></i> নাম: <span id="stName">--</span></p>
            <p><i class="fas fa-graduation-cap"></i> শ্রেণি: <span id="stClass">--</span> | শাখা: <span id="stSec">--</span></p>
            <p><i class="fas fa-id-badge"></i> রোল: <span id="stRoll">--</span> | আইডি: <span id="stID">--</span></p>
        </div>
        <button class="btn btn-start" onclick="startQuiz()">পরীক্ষা শুরু করুন</button>
        <button class="btn" style="background:#94a3b8; color:white;" onclick="location.reload()">ফিরে যান</button>
    </div>

    <div id="exam-page" style="display:none">
        <div id="timer">অবশিষ্ট সময়: <span id="time-left">00:00</span></div>
        <div class="card" id="questions-container"></div>
        <button class="btn btn-start" style="max-width:600px; margin: 20px auto; display:block;" onclick="submitQuiz()">সাবমিট করুন</button>
    </div>

    <script>
        // ইউজার অ্যাপ থেকে তথ্য গ্রহণ করার ব্যবস্থা
        const studentInfo = JSON.parse(localStorage.getItem('loggedUser')) || {};
        document.getElementById('stName').innerText = studentInfo.name || "--";
        document.getElementById('stClass').innerText = studentInfo.cls || "--";
        document.getElementById('stSec').innerText = studentInfo.sec || "--";
        document.getElementById('stRoll').innerText = studentInfo.roll || "--";
        document.getElementById('stID').innerText = studentInfo.id || "--";

        const firebaseConfig = {"apiKey":"AIzaSyBmCTx0ytWLW6YPeAbUHGEixFOehynuEco","databaseURL":"https://quiz-storage-d8707-default-rtdb.firebaseio.com","projectId":"quiz-storage-d8707"};
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        const questions = [{"num":1,"stimulus":"ক","q":"ত","o1":"জ","o2":"গ","o3":"ত","o4":"দ","ans":"গ"},{"num":2,"stimulus":"","q":"জ","o1":"জ","o2":"ত","o3":"ম","o4":"দ","ans":"গ"}];

        function startQuiz() {
            document.getElementById('setup-page').style.display = 'none';
            document.getElementById('exam-page').style.display = 'block';
            // এখানে আপনার কুইজ শুরু করার লজিক (টাইমার ইত্যাদি) যোগ করুন
            alert("পরীক্ষা শুরু হলো!");
        }

        function submitQuiz() {
            alert("পরীক্ষা সাবমিট হয়েছে!");
            location.reload();
        }
    </script>
</body>
</html>
