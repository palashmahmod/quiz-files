        // ডাইনামিক ডিভাইস ট্র্যাকিং লজিক (Escaped carefully)
        function getDeviceInformation() {
            var ua = navigator.userAgent;
            var deviceModel = "Unknown Device";
            
            if (/android/i.test(ua)) {
                var matches = ua.match(/Android\s+([^\s;]+);?\s+([^;?)]+)/);
                if (matches && matches[2]) {
                    deviceModel = matches[2].trim();
                } else {
                    deviceModel = "Android Device";
                }
            } else if (/iPhone|iPad|iPod/i.test(ua)) {
                deviceModel = "Apple iPhone";
            } else if (/Macintosh/i.test(ua)) {
                deviceModel = "Mac PC";
            } else if (/Windows/i.test(ua)) {
                deviceModel = "Windows PC";
            }

            var deviceUUID = localStorage.getItem("quiz_device_uuid");
            if (!deviceUUID) {
                deviceUUID = 'DEV-' + Math.random().toString(36).substring(2, 11).toUpperCase() + '-' + Date.now().toString(36).toUpperCase();
                localStorage.setItem("quiz_device_uuid", deviceUUID);
            }
            return { model: deviceModel, uuid: deviceUUID };
        }

        }
        function startExam(existingSec) {
            if(!existingSec) {
                localStorage.removeItem("ans_" + fName + "_" + user.id);
                localStorage.removeItem("start_time_" + fName + "_" + user.id);
            }
            if(!localStorage.getItem("start_time_" + fName + "_" + user.id)){
                localStorage.setItem("start_time_" + fName + "_" + user.id, Date.now());
            }
            document.getElementById('preview-box').style.display = 'none';
            document.getElementById('exam-box').style.display = 'block';
            var list = document.getElementById('q-list');
            var savedAns = JSON.parse(localStorage.getItem("ans_" + fName + "_" + user.id) || "{}");
            var h = "";
            questions.forEach(function(q, i){
                var s = savedAns["q"+i] || "";
                h += "<div class='card'>";
                if(q.stim && q.stim.trim() !== "") {
                    h += "<div class='stim-box'>"+q.stim.replace(/\\n/g, '<br>')+"</div>";
                }
                h += "<p><b>"+(i+1)+". "+q.ques.replace(/\\n/g, '<br>')+"</b></p>";
                if(q.img) h += "<img src='"+q.img+"' style='width:100%;border-radius:8px;margin-bottom:10px;'>";
                h += "<label class='opt'><input type='radio' name='q"+i+"' value='ক' onchange='saveAns(\"q"+i+"\", \"ক\")' "+(s=='ক'?'checked':'')+"> ক) "+q.o1+"</label>";
                h += "<label class='opt'><input type='radio' name='q"+i+"' value='খ' onchange='saveAns(\"q"+i+"\", \"খ\")' "+(s=='খ'?'checked':'')+"> খ) "+q.o2+"</label>";
                h += "<label class='opt'><input type='radio' name='q"+i+"' value='গ' onchange='saveAns(\"q"+i+"\", \"গ\")' "+(s=='গ'?'checked':'')+"> গ) "+q.o3+"</label>";
                h += "<label class='opt'><input type='radio' name='q"+i+"' value='ঘ' onchange='saveAns(\"q"+i+"\", \"ঘ\")' "+(s=='ঘ'?'checked':'')+"> ঘ) "+q.o4+"</label></div>";
            });
            list.innerHTML = h;
            if(window.MathJax) window.MathJax.typeset();
            var totalSec = existingSec || (30 * 60);
            if(!existingSec) {
                var expiry = Math.floor(Date.now()/1000) + totalSec;
                localStorage.setItem("timer_" + fName + "_" + user.id, expiry);
            }
            runTimer(totalSec);
        }
        function runTimer(sec) {
            timerInterval = setInterval(function(){
                var m = Math.floor(sec/60), s = sec%60;
                document.getElementById("t").innerText = "সময় বাকি: " + m + ":" + (s < 10 ? "0" : "") + s;
                if(sec <= 0){ clearInterval(timerInterval); submitQuiz(); }
                sec--;
            }, 1000);
        }
        function submitQuiz() {
            clearInterval(timerInterval);
            var startTime = localStorage.getItem("start_time_" + fName + "_" + user.id) || Date.now();
            var diff = Math.floor((Date.now() - startTime) / 1000);
            var mSpent = Math.floor(diff / 60);
            var sSpent = diff % 60;
            var timeSpentStr = mSpent + "m " + sSpent + "s";
            var btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "জমা হচ্ছে...";
            var correct = 0;
            var wrongNums = [];
            questions.forEach(function(q, i){
                var sel = document.querySelector('input[name="q'+i+'"]:checked');
                if(sel && sel.value === q.ans) { 
                    correct++; 
                } else { 
                    if(sel) { wrongNums.push((i + 1) + "(" + sel.value + ")"); } 
                    else { wrongNums.push(i + 1); }
                }
            });
            var now = new Date();
            var resData = {
                chapter: "পরিসংখ্যান ", class: user.cls, correct: correct,
                date: now.toLocaleDateString('en-GB'), name: user.name,
                quizTitle: "গণিত ১৭তম অধ্যায়, টেস্ট: ০১", roll: user.roll, section: user.sec,
                subject: "গণিত", time: now.toLocaleTimeString(),
                timeSpent: timeSpentStr, timestamp: firebase.database.ServerValue.TIMESTAMP,
                total: questions.length, userId: user.id,
                wrongQuestions: wrongNums.length > 0 ? wrongNums.join(", ") : "নাই",
                deviceModel: deviceInfo.model,
                deviceIMEI: deviceInfo.uuid
            };
            var resKey = fName + "_" + Date.now();
            db.ref("QuizResults/" + resKey).set(resData).then(() => {
                return db.ref("IndividualQuizzes/" + user.id).once('value');
            }).then(snap => {
                if(snap.exists()){ snap.forEach(child => { if(child.val().file === fName) child.ref.remove(); }); }
                localStorage.removeItem("timer_" + fName + "_" + user.id);
                localStorage.removeItem("start_time_" + fName + "_" + user.id);
                localStorage.removeItem("ans_" + fName + "_" + user.id);
                alert("পরীক্ষা সফলভাবে জমা হয়েছে!");
                
                var reviewHtml = "<div class='card' style='border-top: 5px solid #27ae60;'>";
                reviewHtml += "<h2 style='text-align:center; color:#27ae60; margin-bottom:5px;'>🎉 পরীক্ষা সম্পন্ন হয়েছে!</h2>";
                reviewHtml += "<p style='text-align:center; color:#7f8c8d; margin-top:0;'>আপনার উত্তরপত্র সফলভাবে ডাটাবেসে জমা হয়েছে।</p><hr>";
                
                reviewHtml += "<table style='width:100%; border-collapse:collapse; margin-bottom:15px; font-size:14px;'>";
                reviewHtml += "<tr><td style='padding:5px; color:#555;'><b>পরীক্ষার্থী:</b> "+user.name+"</td><td style='padding:5px; color:#555;'><b>পরীক্ষা:</b> "+document.title+"</td></tr>";
                reviewHtml += "<tr><td style='padding:5px; color:#555;'><b>শ্রেণী-শাখা:</b> "+user.cls+" ("+user.sec+")</td><td style='padding:5px; color:#555;'><b>বিষয়:</b> গণিত</td></tr>";
                reviewHtml += "<tr><td style='padding:5px; color:#555;'><b>রোল নং:</b> "+user.roll+"</td><td style='padding:5px; color:#555;'><b>অধ্যায়:</b> পরিসংখ্যান </td></tr>";
                reviewHtml += "<tr><td colspan='2' style='padding:5px; color:#e67e22;'><b>ডিভাইস মডেল:</b> "+deviceInfo.model+" ("+deviceInfo.uuid+")</td></tr>";
                reviewHtml += "</table><hr>";
                
                reviewHtml += "<div style='background:#f8f9fa; padding:12px; border-radius:8px; margin-bottom:20px; font-size:14px; border-left:4px solid #3498db;'>";
                reviewHtml += "<p style='margin:4px 0;'>📊 <b>মোট প্রশ্ন:</b> "+questions.length+" টি</p>";
                reviewHtml += "<p style='margin:4px 0; color:#27ae60;'>✅ <b>সঠি উত্তর:</b> "+correct+" টি</p>";
                reviewHtml += "<p style='margin:4px 0; color:#e74c3c;'>❌ <b>ভুল ও উত্তরহীন:</b> "+(wrongNums.length > 0 ? wrongNums.join(', ') : 'নাই')+"</p>";
                reviewHtml += "<p style='margin:4px 0; color:#7f8c8d;'>📅 <b>তারিখ ও সময়:</b> "+resData.date+" | "+resData.time+"</p>";
                reviewHtml += "<p style='margin:4px 0; color:#8e44ad;'>⏱️ <b>ব্যয়কৃত সময়:</b> "+timeSpentStr+"</p>";
                reviewHtml += "</div>";
                
                reviewHtml += "<h3 style='color:#2c3e50; border-bottom:2px solid #eee; padding-bottom:8px;'>📝 প্রশ্নপত্র ও উত্তরপত্র পর্যালোচনা (Review):</h3>";
                
                questions.forEach(function(q, idx){
                    var selectedRadio = document.querySelector('input[name="q'+idx+'"]:checked');
                    var selectedVal = selectedRadio ? selectedRadio.value : null;
                    reviewHtml += "<div style='margin-bottom:25px; padding-bottom:15px; border-bottom:1px dashed #ddd;'>";
                    if(q.stim && q.stim.trim() !== "") {
                        reviewHtml += "<div class='stim-box'>"+q.stim.replace(/\n/g, '<br>')+"</div>";
                    }
                    reviewHtml += "<p><b>"+(idx+1)+". "+q.ques.replace(/\n/g, '<br>')+"</b></p>";
                    if(q.img) reviewHtml += "<img src='"+q.img+"' style='width:100%;border-radius:8px;margin-bottom:10px;'>";
                    
                    var opts = [{k:'ক', v:q.o1}, {k:'খ', v:q.o2}, {k:'গ', v:q.o3}, {k:'ঘ', v:q.o4}];
                    opts.forEach(function(opt) {
                        var bgStyle = "background:#f0f0f0; color:#000;";
                        var tickMark = "";
                        if (opt.k === q.ans) {
                            tickMark = " <span style='color:#27ae60; font-weight:bold;'>✔ (সঠিক উত্তর)</span>";
                            if (selectedVal === q.ans) { bgStyle = "background:#d4edda; color:#155724; font-weight:bold; border-color:#c3e6cb;"; }
                        } else if (selectedVal === opt.k) { bgStyle = "background:#f8d7da; color:#721c24; border-color:#f5c6cb;"; }
                        reviewHtml += "<div style='padding:10px; margin:5px 0; border-radius:6px; border:1px solid #ddd; "+bgStyle+"'>"+opt.k+") "+opt.v+tickMark+"</div>";
                    });
                    reviewHtml += "</div>";
                });
                reviewHtml += "</div>";
                document.getElementById("main").innerHTML = reviewHtml;
                if(window.MathJax) window.MathJax.typeset();
            }).catch(e => alert(e.message));
        }
    </script>
</body>
</html>
