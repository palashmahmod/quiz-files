<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>বিজ্ঞান ১০</title><script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script><style>body{font-family:sans-serif;background:#f4f7f6;padding:15px;}.card{background:white;padding:20px;border-radius:12px;max-width:500px;margin:auto;box-shadow:0 2px 5px rgba(0,0,0,0.1);}.timer{position:fixed;top:0;width:100%;left:0;background:red;color:white;text-align:center;padding:5px;z-index:10;}.opt{display:block;padding:10px;background:#eee;margin:5px 0;border-radius:5px;cursor:pointer;}</style></head><body><div id="main"><div class="card"><h2>বিজ্ঞান ১০</h2><p>বিষয়: বিজ্ঞান  | সময়: 1 মিনিট</p><button onclick="start()" style="width:100%;padding:10px;background:green;color:white;border:none;">শুরু করুন</button></div></div><script>var questions = [{"stim":"আমাদের দেশ","ques":"আমাদের দেশের নাম কি?","img":"","o1":"ভারত","o2":"বাংলাদেশে","o3":"নেপাল","o4":"চীন ","ans":"খ"}];function start(){ var h = "<div class='timer' id='t'></div><div class='card' style='margin-top:40px'>";questions.forEach(function(q, i){ h += "<p><b>"+(i+1)+". "+q.ques+"</b></p>"+(q.img?"<img src='"+q.img+"' style='width:100%'>":"")+"<label class='opt'><input type='radio' name='q"+i+"' value='ক'> ক) "+q.o1+"</label>"+"<label class='opt'><input type='radio' name='q"+i+"' value='খ'> খ) "+q.o2+"</label>"+"<label class='opt'><input type='radio' name='q"+i+"' value='গ'> গ) "+q.o3+"</label>"+"<label class='opt'><input type='radio' name='q"+i+"' value='ঘ'> ঘ) "+q.o4+"</label>"; });h += "<button onclick='submit()' style='width:100%;padding:10px;margin-top:10px;'>জমা দিন</button></div>"; document.getElementById("main").innerHTML = h; startTimer(); }function startTimer(){ var sec = 1 * 60; setInterval(function(){ var m=Math.floor(sec/60), s=sec%60; document.getElementById("t").innerText="সময় বাকি: "+m+":"+s; if(sec<=0)submit(); sec--; },1000); }function submit(){ alert("পরীক্ষা সম্পন্ন হয়েছে!"); location.reload(); }</script></body></html>
