<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মডেল টেস্ট ১১</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        window.MathJax = { tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] } };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body{font-family:sans-serif; background:#f4f7f6; padding:15px; margin:0; -webkit-user-select:none;}
        .card{background:white; padding:20px; border-radius:12px; max-width:600px; margin:10px auto; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
        .timer{position:fixed; top:0; left:0; width:100%; background:red; color:white; text-align:center; padding:10px; z-index:100; font-weight:bold; font-size:18px;}
        .opt{display:block; padding:12px; background:#f9f9f9; margin:10px 0; border-radius:8px; border:1px solid #ddd; cursor:pointer; transition:0.2s;}
        .opt:hover{background:#eef; border-color:#3498db;}
        input[type="radio"]{margin-right:10px; transform:scale(1.2);}
        button{width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:8px; font-weight:bold; font-size:16px; cursor:pointer;}
        .stim-box { background: #f0f4f8; padding: 15px; border-left: 5px solid #3498db; margin-bottom: 15px; font-style: italic; line-height:1.6; }
        #result{display:none; text-align:center; padding:20px;}
    </style>
</head>
<body>
    <div id="main">
        <div class="card" id="preview-box" style="text-align:center;">
            <h2>মডেল টেস্ট ১১</h2>
            <p><b>বিষয়:</b> গণিত  | <b>অধ্যায়:</b> ৩য়</p>
            <p><b>সময়:</b> 2 মিনিট</p>
            <button onclick="startExam()">পরীক্ষা শুরু করুন</button>
        </div>
        <div id="exam-box" style="display:none; margin-top:60px;">
            <div class="timer" id="t">সময় বাকি: 2:00</div>
            <div id="q-list"></div>
            <div class="card"><button onclick="submitQuiz()">পরীক্ষা জমা দিন</button></div>
        </div>
        <div class="card" id="result"></div>
    </div>

    <script>
        var config = {"apiKey":"AIzaSyBmCTx0ytWLW6YPeAbUHGEixFOehynuEco","databaseURL":"https://quiz-storage-d8707-default-rtdb.firebaseio.com","projectId":"quiz-storage-d8707"};
        if (!firebase.apps.length) firebase.initializeApp(config);
        var db = firebase.database();
        var questions = [{"stim":"যদি, \\(x^2+ \\frac {1}{x^2}\\) হয়","ques":"যদি, \\(x^2+ \\frac {1}{x^2}\\) হয়","img":"","o1":"\\(x^2+ \\frac {1}{x^2}\\)","o2":"\\(\\sqrt 5 \\)","o3":"5","o4":"8","ans":"খ"}];
        var timeLeft = 2 * 60;
        var timerInterval;

        function startExam() {
            document.getElementById('preview-box').style.display='none';
            document.getElementById('exam-box').style.display='block';
            var h = "";
            questions.forEach((q, i) => {
                h += "<div class='card'>";
                if(q.stim) h += "<div class='stim-box'>"+q.stim.replace(/\n/g, '<br>')+"</div>";
                h += "<p><b>"+(i+1)+". "+q.ques+"</b></p>";
                if(q.img) h += "<img src='"+q.img+"' style='width:100%; border-radius:8px; margin-bottom:10px;'>";
                ['ক','খ','গ','ঘ'].forEach((opt, idx) => {
                    var val = q['o'+(idx+1)];
                    h += "<label class='opt'><input type='radio' name='q"+i+"' value='"+opt+"'> "+opt+") "+val+"</label>";
                });
                h += "</div>";
            });
            document.getElementById('q-list').innerHTML = h;
            if(window.MathJax) MathJax.typesetPromise();
            startTimer();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                var m = Math.floor(timeLeft / 60);
                var s = timeLeft % 60;
                document.getElementById('t').innerText = "সময় বাকি: " + m + ":" + (s < 10 ? '0' : '') + s;
                if(timeLeft <= 0) { clearInterval(timerInterval); submitQuiz(); }
                timeLeft--;
            }, 1000);
        }

        function submitQuiz() {
            clearInterval(timerInterval);
            var score = 0;
            questions.forEach((q, i) => {
                var sel = document.querySelector('input[name="q"+i]:checked');
                if(sel && sel.value === q.ans) score++;
            });
            var resBox = document.getElementById('result');
            document.getElementById('exam-box').style.display='none';
            resBox.style.display='block';
            resBox.innerHTML = "<h3>পরীক্ষা সম্পন্ন!</h3><h1>আপনার স্কোর: "+score+"/"+questions.length+"</h1>";
            
            // Firebase-এ ডাটা পাঠানো (ঐচ্ছিক)
            db.ref('results').push({ 
                quiz: "মডেল টেস্ট ১১", 
                score: score, 
                total: questions.length,
                time: new Date().toLocaleString()
            });
        }
    </script>
</body>
</html>
