<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মডেল টেস্ট ৫</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body{font-family:sans-serif;background:#f4f7f6;padding:15px;margin:0;}
        .card{background:white;padding:20px;border-radius:12px;max-width:500px;margin:10px auto;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
        .timer{position:fixed;top:0;left:0;width:100%;background:red;color:white;text-align:center;padding:8px;z-index:100;font-weight:bold;}
        .opt{display:block;padding:12px;background:#f0f0f0;margin:8px 0;border-radius:8px;cursor:pointer;border:1px solid #ddd;}
        input[type="radio"]{margin-right:10px;}
        button{width:100%;padding:12px;background:#27ae60;color:white;border:none;border-radius:8px;font-weight:bold;cursor:pointer;}
        #login-box{margin-top:50px;}
    </style>
</head>
<body>
    <div id="main">
        <div class="card" id="login-box">
            <h2 style="text-align:center">মডেল টেস্ট ৫</h2>
            <p style="text-align:center">বিষয়: বিজ্ঞান </p>
            <input type="number" id="uId" placeholder="আপনার আইডি দিন" style="width:100%;padding:12px;margin-bottom:15px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box;">
            <button id="startBtn" onclick="checkUser()">শুরু করুন</button>
        </div>
    </div>

    <script>
        
        var firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            databaseURL: "https://quiz-storage-d8707-default-rtdb.firebaseio.com",
            projectId: "quiz-storage-d8707",
            storageBucket: "quiz-storage-d8707.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        var db = firebase.database();
    
        var questions = [{"stim":"ক","ques":"ককক","img":"","o1":"দ","o2":"গ","o3":"ব","o4":"ন","ans":"খ"},{"stim":"","ques":"আমি","img":"","o1":"জ","o2":"গ","o3":"ড়","o4":"ত","ans":"ঘ"}];
        var fName = "609";
        var userData = {};
        var startTime;

        function checkUser(){
            var id = document.getElementById("uId").value;
            if(!id) return alert("আইডি দিন!");
            document.getElementById("startBtn").disabled = true;

            db.ref("users/" + id).once("value", function(snap){
                if(snap.exists()){
                    userData = snap.val();
                    // স্ট্যাটাস চেক: এডমিন নতুন ফাইল পাঠালে 'off' নোডটি এডমিন অ্যাপ থেকে ডিলিট হতে হবে
                    db.ref("QuizStatus/" + id + "/" + fName).once("value", function(stSnap){
                        if(stSnap.val() === "off"){
                            alert("এই কুইজটি আপনি শেষ করেছেন। পুনরায় সুযোগ পেতে এডমিনের সাথে যোগাযোগ করুন।");
                            document.getElementById("startBtn").disabled = false;
                        } else {
                            startQuiz();
                        }
                    });
                } else {
                    alert("ভুল আইডি!");
                    document.getElementById("startBtn").disabled = false;
                }
            });
        }

        function startQuiz(){
            startTime = Date.now();
            var h = "<div class='timer' id='t'>সময় বাকি: 2:00</div><div class='card' style='margin-top:50px'>";
            questions.forEach(function(q, i){
                h += "<div style='margin-bottom:25px;'><p><b>"+(i+1)+". "+q.ques+"</b></p>";
                if(q.img) h += "<img src='"+q.img+"' style='width:100%;border-radius:8px;margin-bottom:10px;'>";
                h += "<label class='opt'><input type='radio' name='q"+i+"' value='ক'> ক) "+q.o1+"</label>";
                h += "<label class='opt'><input type='radio' name='q"+i+"' value='খ'> খ) "+q.o2+"</label>";
                h += "<label class='opt'><input type='radio' name='q"+i+"' value='গ'> গ) "+q.o3+"</label>";
                h += "<label class='opt'><input type='radio' name='q"+i+"' value='ঘ'> ঘ) "+q.o4+"</label></div>";
            });
            h += "<button id='submitBtn' onclick='submitQuiz()'>জমা দিন</button></div>";
            document.getElementById("main").innerHTML = h;
            startTimer();
        }

        function startTimer(){
            var sec = 2 * 60;
            var countdown = setInterval(function(){
                var m=Math.floor(sec/60), s=sec%60;
                var el = document.getElementById("t");
                if(!el) { clearInterval(countdown); return; }
                el.innerText = "সময় বাকি: " + m + ":" + (s < 10 ? "0" : "") + s;
                if(sec <= 0){ clearInterval(countdown); submitQuiz(); }
                sec--;
            }, 1000);
        }

        function submitQuiz(){
            document.getElementById('submitBtn').disabled = true;
            var correctCount = 0;
            questions.forEach(function(q, i){
                var sel = document.querySelector('input[name="q'+i+'"]:checked');
                if(sel && sel.value === q.ans) correctCount++;
            });

            var now = new Date();
            var resultKey = fName + "_" + Date.now(); // প্রতিবার ভিন্ন নামে সেভ করার জন্য টাইমস্ট্যাম্প যোগ করা হয়েছে
            
            var finalData = {
                quizTitle: "মডেল টেস্ট ৫",
                name: userData.name,
                userId: userData.userId,
                correct: correctCount,
                total: questions.length,
                date: now.toLocaleDateString('bn-BD'),
                time: now.toLocaleTimeString(),
                timestamp: Date.now()
            };

            // ১. রেজাল্ট সেভ
            db.ref("QuizResults/" + userData.userId + "/" + resultKey).set(finalData).then(() => {
                // ২. কুইজ স্ট্যাটাস অফ করা
                return db.ref("QuizStatus/" + userData.userId + "/" + fName).set("off");
            }).then(() => {
                alert("পরীক্ষা সফলভাবে সম্পন্ন হয়েছে!");
                
                // ৩. লোকাল স্টোরেজ ক্লিয়ার
                localStorage.removeItem('quiz_draft_new');
                
                // ৪. এন্ড্রয়েড অ্যাপকে নির্দেশ পাঠানো ফাইল ডিলিট করার জন্য
                if(window.AndroidInterface){
                    window.AndroidInterface.deleteFile(fName + ".html");
                } else {
                    document.getElementById("main").innerHTML = "<div class='card'><h2>জমা হয়েছে</h2><p>ফাইলটি এখন বন্ধ করুন।</p></div>";
                }
            }).catch(e => alert(e.message));
        }
    </script>
</body>
</html>
