    let timerInt, endTime;
    window.onload = function() {
        if(localStorage.getItem('done_' + uID + '_' + fName)) { exitApp(); return; }
        const savedTime = localStorage.getItem('end_' + uID + '_' + fName);
        if(savedTime) {
            if(Date.now() < savedTime) startExam(true);
            else { alert('সময় শেষ!'); exitApp(); }
        }
    };
    function startExam(isResume = false) {
        document.getElementById('page1').classList.remove('active-page');
        document.getElementById('page2').classList.add('active-page');
        renderQuestions();
        if(!isResume) {
            endTime = Date.now() + (Number(1) * 60 * 1000);
            localStorage.setItem('end_' + uID + '_' + fName, endTime);
        } else {
            endTime = parseInt(localStorage.getItem('end_' + uID + '_' + fName));
        }
        timerInt = setInterval(updateTimer, 1000);
    }
    function renderQuestions() {
        let html = '';
        questions.forEach((q, i) => {
            const saved = localStorage.getItem('ans_' + uID + '_' + fName + '_' + i);
            html += '<div class="q-box">' +
                '<div>' + (q.stim ? q.stim + '<br>' : '') + '<b>' + (i+1) + '. ' + q.ques + '</b></div>' +
                (q.img && q.img.startsWith('data:image') ? '<br><img src="'+q.img+'">' : '') +
                ['ক','খ','গ','ঘ'].map((opt, j) => {
                    return '<label class="opt">' +
                        '<input type="radio" name="q' + i + '" value="' + opt + '" onchange="saveProgress(' + i + ', \'' + opt + '\')" ' + (saved === opt ? 'checked' : '') + '> ' +
                        opt + ') ' + q['o'+(j+1)] +
                        '</label>';
                }).join('') +
            '</div>';
        });
        document.getElementById('quizArea').innerHTML = html;
        if(window.MathJax) MathJax.typeset();
    }
    function saveProgress(idx, val) { localStorage.setItem('ans_' + uID + '_' + fName + '_' + idx, val); }
    function updateTimer() {
        const diff = endTime - Date.now();
        if(diff <= 0) { clearInterval(timerInt); submitQuiz(); return; }
        let m = Math.floor(diff / 60000), s = Math.floor((diff % 60000) / 1000);
        document.getElementById('timerDisp').innerText = "সময় বাকি: " + m + ":" + (s < 10 ? '0' : '') + s;
    }
    function confirmSubmit() { if(confirm("জমা দিতে চান?")) submitQuiz(); }
    function submitQuiz() {
        clearInterval(timerInt);
        localStorage.setItem('done_' + uID + '_' + fName, 'true');
        let correct = 0, results = [], wrongQ = [];
        questions.forEach((q, i) => {
            const sel = localStorage.getItem('ans_' + uID + '_' + fName + '_' + i);
            if(sel === q.ans) { correct++; } else { wrongQ.push(i + 1); }
            results.push({ sel, correct: sel === q.ans });
        });
        const timeSpentRaw = Math.floor((Number(1) * 60) - ((endTime - Date.now()) / 1000));
        const finalData = {
            userId: uID, name: uName, roll: uRoll || "N/A", section: uSec || "N/A", 
            quizTitle: "মডেল টেস্ট ৬", class: uCls || "৮ম", subject: "বিজ্ঞান",
            chapter: "২য়", correct: correct, total: questions.length, 
            wrongQuestions: wrongQ.join(', '),
            timeSpent: Math.floor(timeSpentRaw/60) + "m " + (timeSpentRaw%60) + "s",
            date: new Date().toLocaleDateString('bn-BD'), time: new Date().toLocaleTimeString('bn-BD'),
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };
        db.ref('QuizResults').push(finalData);
        db.ref('IndividualQuizzes/' + uID + '/' + fName).remove();
        showResult(finalData, results);
    }
    function showResult(data, results) {
        document.getElementById('page2').classList.remove('active-page');
        document.getElementById('page3').classList.add('active-page');
        document.getElementById('resultSummary').innerHTML = '<b>তারিখ:</b> ' + data.date + ' | <b>সময়:</b> ' + data.time + '<br>' +
            '<b>ব্যয়িত সময়:</b> ' + data.timeSpent + ' | <b>সঠিক:</b> ' + data.correct + '/' + data.total + '<br>' +
            '<b style="color:red;">ভুল প্রশ্নের ক্রমিক:</b> ' + (data.wrongQuestions || 'সব সঠিক');
        let reviewHtml = '';
        questions.forEach((q, i) => {
            reviewHtml += '<div class="q-box"><div>' + (q.stim ? q.stim + '<br>' : '') + '<b>' + (i+1) + '. ' + q.ques + '</b></div>' +
                ['ক','খ','গ','ঘ'].map((opt, j) => {
                    let cls = (opt === q.ans) ? 'correct' : (opt === (results[i] ? results[i].sel : '') ? 'wrong' : '');
                    return '<div class="opt ' + cls + '">' + opt + ') ' + q['o'+(j+1)] + '</div>';
                }).join('') + '</div>';
        });
        document.getElementById('reviewArea').innerHTML = reviewHtml;
        if(window.MathJax) MathJax.typeset();
        setTimeout(() => { exitApp(); }, 120000);
    }
    function exitApp() {
        Object.keys(localStorage).forEach(key => { if(key.includes(uID) && key.includes(fName)) localStorage.removeItem(key); });
        window.location.replace("https://palashmahmod.github.io/index.html");
    }
