<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>মডেল টেস্ট ৮</title>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<style>
:root { --p: #2c3e50; --s: #27ae60; }
body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
.card { background: white; padding: 20px; border-radius: 15px; max-width: 600px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
.btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
.q-box { text-align: left; border-bottom: 1px solid #eee; padding: 15px 0; }
.opt { display: block; padding: 10px; border: 1px solid #ddd; margin: 5px 0; border-radius: 8px; }
</style>
</head>
<body>
<div id="setup"><div class="card"><h2>মডেল টেস্ট ৮</h2><p>শ্রেণি: ৮ম | বিষয়: বিজ্ঞান </p><div style="background:#f9f9f9;padding:10px;margin:15px 0;text-align:left;"><p>নাম: <span id="sName">...</span></p><p>রোল: <span id="sRoll">...</span></p></div><button class="btn" style="background:var(--s);color:white;" onclick="start()">পরীক্ষা শুরু করুন</button><button class="btn" style="background:#ddd;" onclick="location.href='index.html'">ফিরে যান</button></div></div><div id="exam" style="display:none;"><div class="card"><div id="q-list"></div><button class="btn" style="background:var(--s);color:white;" onclick="finish()">সাবমিট করুন</button></div></div><div id="result" style="display:none;" class="card"><h2>ফলাফল</h2><div id="res-badge"></div><button class="btn" style="background:var(--p);color:white;" onclick="location.href='index.html'">হোমে ফিরুন</button></div><script>
const conf = {"apiKey":"AIzaSyBmCTx0ytWLW6YPeAbUHGEixFOehynuEco","databaseURL":"https://quiz-storage-d8707-default-rtdb.firebaseio.com","projectId":"quiz-storage-d8707"};
firebase.initializeApp(conf);
const db = firebase.database();
const qs = [{"stim":"ক","q":"কাল","o1":"ক","o2":"ত","o3":"দ","o4":"ম","ans":"ক"},{"stim":"","q":"চা","o1":"হ","o2":"গ","o3":"ট","o4":"ড","ans":"গ"}];
const user = JSON.parse(localStorage.getItem("loggedUser")) || {};
window.onload = () => {
  if(user.name) {
    document.getElementById("sName").innerText = user.name;
    document.getElementById("sRoll").innerText = user.roll;
  } else { alert("লগইন করুন!"); location.href="index.html"; }
};
function start() {
  document.getElementById("setup").style.display="none";
  document.getElementById("exam").style.display="block";
  document.getElementById("q-list").innerHTML = qs.map((q, i) => `
    <div class="q-box">
      ${q.stim ? `<div style="background:#eee;padding:10px;">${q.stim}</div>` : ""}
      <b>${i+1}. ${q.q}</b>
      <label class="opt"><input type="radio" name="q${i}" value="ক"> ক) ${q.o1}</label>
      <label class="opt"><input type="radio" name="q${i}" value="খ"> খ) ${q.o2}</label>
      <label class="opt"><input type="radio" name="q${i}" value="গ"> গ) ${q.o3}</label>
      <label class="opt"><input type="radio" name="q${i}" value="ঘ"> ঘ) ${q.o4}</label>
    </div>`).join("");
}
async function finish() {
  let score = 0;
  qs.forEach((q, i) => {
    const sel = document.querySelector(`input[name="q${i}"]:checked`);
    if(sel && sel.value === q.ans) score++;
  });
  await db.ref("QuizResults").push({ name: user.name, roll: user.roll, quiz: "608", score: score + "/২", time: new Date().toLocaleString() });
  document.getElementById("exam").style.display="none";
  document.getElementById("result").style.display="block";
  document.getElementById("res-badge").innerHTML = "<h3>আপনার স্কোর: "+score+"</h3>";
}
</script></body></html>
